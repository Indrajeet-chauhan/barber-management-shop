{% extends 'base.html' %}
{% block title %}Reserve Time Slot | BarberOS{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-8">
        <a href="{{ url_for('appointment.index') }}" class="text-xs font-semibold text-slate-400 hover:text-amber-500 transition">
            ← Back to Daily Chair Schedule
        </a>
        <h2 class="text-2xl font-bold tracking-tight mt-3">Reserve Chair Time Slot</h2>
        <p class="text-sm text-slate-400 mt-1">Schedule service workflows and assign active staff tracking profiles.</p>
    </div>

    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 shadow-2xl">
        <form action="{{ url_for('appointment.book') }}" method="POST" class="space-y-6">
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Target Customer ID *</label>
                    <input type="number" name="customer_id" required placeholder="1" min="1"
                           class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-800 focus:outline-none focus:border-amber-500 transition">
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Assigned Employee ID *</label>
                    <input type="number" name="employee_id" required placeholder="1" min="1"
                           class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-800 focus:outline-none focus:border-amber-500 transition">
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Calendar Target Date *</label>
                    <input type="date" name="date" required value="2026-07-20"
                           class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-amber-500 transition">
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Timeline Time Slot *</label>
                    <input type="time" name="time" required value="14:00"
                           class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-amber-500 transition">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Menu Service Treatment Selected *</label>
                <input type="text" name="service_name" required placeholder="Classic Beard Trim & Shave"
                       class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-700 focus:outline-none focus:border-amber-500 transition">
            </div>

            <div class="pt-4 border-t border-slate-800 flex justify-end gap-4">
                <a href="{{ url_for('appointment.index') }}" class="bg-slate-950 border border-slate-800 text-slate-400 hover:text-slate-200 px-5 py-3 rounded-xl text-sm font-semibold transition">
                    Cancel Selection
                </a>
                <button type="submit" class="bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold uppercase tracking-wider text-sm px-6 py-3 rounded-xl transition shadow-lg shadow-amber-500/10">
                    Confirm Chair Booking
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
