{% extends 'base.html' %}
{% block title %}Onboard Staff Member | BarberOS{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-8">
        <a href="{{ url_for('employee.index') }}" class="text-xs font-semibold text-slate-400 hover:text-amber-500 transition">
            ← Back to Staff Roster
        </a>
        <h2 class="text-2xl font-bold tracking-tight mt-3">Onboard Staff Member</h2>
        <p class="text-sm text-slate-400 mt-1">Configure structural contract elements, baseline profiles, and percentage splits.</p>
    </div>

    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 shadow-2xl">
        <form action="{{ url_for('employee.add') }}" method="POST" class="space-y-6">
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Full Legal Name *</label>
                    <input type="text" name="name" required placeholder="Jack Razor"
                           class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-700 focus:outline-none focus:border-amber-500 transition">
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Role Designation *</label>
                    <select name="role" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-300 focus:outline-none focus:border-amber-500 transition">
                        <option value="Barber">Master Barber</option>
                        <option value="Stylist">Junior Stylist</option>
                        <option value="Receptionist">Front-Desk Cashier</option>
                        <option value="Manager">Operations Manager</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Primary Phone Line *</label>
                    <input type="tel" name="phone" required placeholder="555-4321"
                           class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-700 focus:outline-none focus:border-amber-500 transition">
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Corporate Email</label>
                    <input type="email" name="email" placeholder="jack@barber.com"
                           class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-700 focus:outline-none focus:border-amber-500 transition">
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Base Monthly Salary ($) *</label>
                    <input type="number" name="salary" required step="0.01" min="0" placeholder="2500.00"
                           class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-700 focus:outline-none focus:border-amber-500 transition">
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Commission Split Target (%) *</label>
                    <input type="number" name="commission_rate" required step="0.1" min="0" max="100" placeholder="20.0"
                           class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-700 focus:outline-none focus:border-amber-500 transition">
                </div>
            </div>

            <div class="pt-4 border-t border-slate-800 flex justify-end gap-4">
                <a href="{{ url_for('employee.index') }}" class="bg-slate-950 border border-slate-800 text-slate-400 hover:text-slate-200 px-5 py-3 rounded-xl text-sm font-semibold transition">
                    Cancel Allocation
                </a>
                <button type="submit" class="bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold uppercase tracking-wider text-sm px-6 py-3 rounded-xl transition shadow-lg shadow-amber-500/10">
                    Commit Roster Record
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
